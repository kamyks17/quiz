<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style_quiz.css">
  <title>Quiz</title>
</head>
<body>
  <div class="container">
    <h1>Quiz</h1>
    <div id="quiz"></div>
    <div id="result" class="result"></div>
    <button id="retry" class="button retryButton hide">Spróbuj jeszcze raz</button>
    <button id="showAnswer" class="button showAnswerButton hide">Pokaż odpowiedzi</button>
  </div>
  <script>
    const quizData = [
      {
        question: 'Pytanie 1: Czy jesteś pewien, że chcesz wziąć udział w tym quizie?',
        options: ['Tak', 'Nie'],
        answer: 'Tak',
      },
      {
        question: 'Pytanie 2: Co jest szybsze?',
        options: ['Rower', 'Samochód', 'Pieszo', 'Samolot'],
        answer: 'Samolot',
      },
      {
        question: 'Pytanie 3: Która z tych marek jest operatorem sieci komórkowej?',
        options: ['Apple', 'Samsung', 'T-Mobile', 'Sony'],
        answer: 'T-Mobile',
      },
      {
        question: 'Pytanie 4: Czy woda jest mokra?',
        options: ['Fałsz','Prawda'],
        answer: 'Prawda',
      },
      {
        question: 'Pytanie 5: Czy ziemia jest płaska?',
        options: ['Tak','Nie'],
        answer: 'Nie',
      },
    ];

    const quizContainer = document.getElementById('quiz');
    const resultContainer = document.getElementById('result');
    const retryButton = document.getElementById('retry');
    const showAnswerButton = document.getElementById('showAnswer');

    let currentQuestion = 0;
    let score = 0;
    let incorrectAnswers = [];

    function shuffleArray(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
    }

    function displayQuestion() {
      const questionData = quizData[currentQuestion];

      const questionElement = document.createElement('div');
      questionElement.className = 'question';
      questionElement.innerHTML = questionData.question;

      const optionsElement = document.createElement('div');
      optionsElement.className = 'options';

      const shuffledOptions = [...questionData.options];
      shuffleArray(shuffledOptions);

      for (let i = 0; i < shuffledOptions.length; i++) {
        const option = document.createElement('div');
        option.className = 'option';

        option.innerHTML = shuffledOptions[i];

        option.addEventListener('click', () => {
          checkAnswer(shuffledOptions[i]);
        });

        optionsElement.appendChild(option);
      }

      quizContainer.innerHTML = '';
      quizContainer.appendChild(questionElement);
      quizContainer.appendChild(optionsElement);
    }

    function checkAnswer(answer) {
      if (answer === quizData[currentQuestion].answer) {
        score++;
      } else {
        incorrectAnswers.push({
          question: quizData[currentQuestion].question,
          incorrectAnswer: answer,
          correctAnswer: quizData[currentQuestion].answer,
        });
      }
      currentQuestion++;

      if (currentQuestion < quizData.length) {
        displayQuestion();
      } else {
        displayResult();
      }
    }

    function displayResult() {
      quizContainer.style.display = 'none';
      retryButton.style.display = 'inline-block';
      showAnswerButton.style.display = 'inline-block';
      resultContainer.innerHTML = ` ${score} / ${quizData.length}`;
    }

    function retryQuiz() {
      currentQuestion = 0;
      score = 0;
      incorrectAnswers = [];
      quizContainer.style.display = 'block';
      retryButton.style.display = 'none';
      showAnswerButton.style.display = 'none';
      resultContainer.innerHTML = '';
      displayQuestion();
    }

    function showAnswer() {
      quizContainer.style.display = 'none';
      retryButton.style.display = 'inline-block';
      showAnswerButton.style.display = 'none';

      let incorrectAnswersHtml = '';
      for (let i = 0; i < incorrectAnswers.length; i++) {
        incorrectAnswersHtml += `
          <p>
            <strong>Pytanie:</strong>   ${incorrectAnswers[i].question}<br>
            <strong>Twoja odpowiedź:</strong>   ${incorrectAnswers[i].incorrectAnswer}<br>
            <strong>Poprawna odpowiedź:</strong>  ${incorrectAnswers[i].correctAnswer}
          </p>
        `;
      }

      resultContainer.innerHTML = `
        <p> ${score} / ${quizData.length}</p>
        <p>Błędne odpowiedzi:</p>
        ${incorrectAnswersHtml}
      `;
    }

    document.addEventListener('DOMContentLoaded', () => {
      displayQuestion();
    });

    retryButton.addEventListener('click', retryQuiz);
    showAnswerButton.addEventListener('click', showAnswer);
  </script>
</body>
</html>
